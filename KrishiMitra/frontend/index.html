
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KrishiMitra – Demo</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 0; background: #f6fff5; color: #123; }
    header { background: linear-gradient(135deg,#1a7f37,#a1d06a); color: #fff; padding: 24px; }
    .container { max-width: 900px; margin: 24px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); margin-bottom: 16px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { font-weight: 600; }
    input, select, button, textarea { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #cfd8d3; }
    button { background: #1a7f37; color: #fff; border: none; cursor: pointer; font-weight: 700; }
    button:hover { filter: brightness(0.95); }
    pre { background: #0b1; color: #031; padding: 12px; border-radius: 12px; overflow-x: auto; }
    .answer { font-size: 1.1rem; line-height: 1.5; }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip { background: #e6f4ea; padding: 6px 10px; border-radius: 999px; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>KrishiMitra – Offline-First Multilingual AI Farm Advisor (Demo)</h1>
      <p>Ask about weather, soil, market prices, or schemes. Example: "Agle hafte barish hogi kya? pincode 110001" or "Bhindi ke daam?".</p>
    </div>
  </header>
  <main class="container">
    <div class="card">
      <div class="row">
        <div>
          <label for="query">Your Question</label>
          <textarea id="query" rows="3" placeholder="Type your question..."></textarea>
        </div>
        <div>
          <label for="pincode">Pincode (optional)</label>
          <input id="pincode" placeholder="e.g., 110001" />
          <label for="crop">Crop (optional)</label>
          <input id="crop" placeholder="e.g., Bhindi" />
          <label for="language">Language (optional)</label>
          <select id="language">
            <option value="">Auto-detect</option>
            <option value="en">English</option>
            <option value="hi">Hindi</option>
          </select>
        </div>
      </div>
      <button id="askBtn">Ask KrishiMitra</button>
    </div>

    <div id="result" class="card" style="display:none;">
      <h3>Answer</h3>
      <p id="answer" class="answer"></p>
      <div class="chips" id="sources"></div>
      <h4>Details</h4>
      <pre id="details"></pre>
      <h4>Reasoning</h4>
      <ul id="reasoning"></ul>
    </div>
  </main>

<script>
const API_BASE = "http://127.0.0.1:8000";
const askBtn = document.getElementById('askBtn');
askBtn.addEventListener('click', async () => {
  const query = document.getElementById('query').value.trim();
  const pincode = document.getElementById('pincode').value.trim();
  const crop = document.getElementById('crop').value.trim();
  const language = document.getElementById('language').value;

  if(!query){ alert("Please enter a question."); return; }

  const payload = { query, pincode: pincode || null, crop: crop || null, language: language || null };

  const res = await fetch(API_BASE + "/ask", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  const data = await res.json();

  document.getElementById('result').style.display = 'block';
  document.getElementById('answer').textContent = data.answer;
  document.getElementById('details').textContent = JSON.stringify(data.data, null, 2);

  const sourcesDiv = document.getElementById('sources');
  sourcesDiv.innerHTML = "";
  (data.sources || []).forEach(s => {
    const span = document.createElement('span');
    span.className = 'chip';
    span.textContent = s;
    sourcesDiv.appendChild(span);
  });

  const reasoningUl = document.getElementById('reasoning');
  reasoningUl.innerHTML = "";
  (data.reasoning || []).forEach(step => {
    const li = document.createElement('li');
    li.textContent = step;
    reasoningUl.appendChild(li);
  });
});
</script>
</body>
</html>
